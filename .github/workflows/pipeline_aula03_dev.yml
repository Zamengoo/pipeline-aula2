name: Pipeline Aula 02

on:
  push:
    branchs:          
      -main          

jobs: 

  test:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes
        run: pytest     
  
  build:
    runs-on: ubuntu-latest
    needs: test
    steps: 
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Gerar arterfato ZIP
        run:  zip -r pipeline-demo.zip .

      - name: Publicar arterfato
        uses: actions/upload-artifact@v4
        with: 
          name: codigo-buildado
          path: pipeline-demo.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    steps: 
      - name: Deploy
        run: echo "Executando o deploy"