name: Pipeline Aula 02

on:
 push:
  branchs:
    -dev
 pull_request:
  branchs:
    -main
    -dev
jobs:

  test:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout código na dev
        uses: actions/checkout@v4

      - name: Configurar Python na dev
        uses: actions/setup-python@v4
        with: 
         python-version: '3.11'

      - name: Instalar Dependencias na dev
        run: | 
         python -m pip install --upgrade pip
         pip install -r requirements.txt

      - name: Rodar Testes na dev
        run: pytest
      
      - name: Baixar Artefato
        uses: actions/download-artifact@v4
        with:
          name: codigo-buildado
        
      - name: Extrair Artefato
        run: unzip pipeline-demon.zip
        
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Gerar Artefato ZIP
        run: zip -r pipeline-demon.zip

      - name: Publicar Artefato
        uses: actions/upload-artifact@v4
        with: 
          name: codigo-buildado
          path: pipeline-demo.zip

    deploy:
      runs-on: ubuntu-latest
      needs: test
      environment:
        name: production