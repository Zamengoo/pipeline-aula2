name: Pipeline Aula 02

on:
 push:
  branchs:
    -dev
 pull_request:
  branchs:
    -dev
    -main

jobs:

  build:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout código na dev
        uses: actions/checkout@v3

      - name: Configurar Python na dev
        uses: actions/setup-python@v4
        with: 
         python-version: '3.11'

      - name: Instalar Dependencias na dev
        run: | 
         python -m pip install --upgrade pip
         pip install -r requirements.txt

      - name: Rodar Testes na dev
        run: pytest